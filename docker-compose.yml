version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: moldmind
      POSTGRES_USER: moldmind
      POSTGRES_PASSWORD: moldmind_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moldmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: moldmind
      MINIO_ROOT_PASSWORD: moldmind_dev
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://moldmind:moldmind_dev@postgres:5432/moldmind
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: moldmind
      S3_SECRET_KEY: moldmind_dev
      S3_BUCKET: moldmind-files
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./apps/api/src:/app/src
      - ./services:/app/services

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://moldmind:moldmind_dev@postgres:5432/moldmind
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: moldmind
      S3_SECRET_KEY: moldmind_dev
      S3_BUCKET: moldmind-files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src
      - ./services:/app/services

  # OpenFOAM container — long-running, we `docker exec` into it from the API to
  # run blockMesh / snappyHexMesh / interFoam on case directories mounted below.
  # The availability probe in services/simulation/src/openfoam_runner.py matches
  # any container whose name contains "openfoam" (compose names it like
  # "moldmind-openfoam-1" which matches).
  openfoam:
    image: opencfd/openfoam-default:2312
    # Keep it idling so we can docker exec into it on demand.
    command: ["bash", "-lc", "source /usr/lib/openfoam/openfoam2312/etc/bashrc && echo OpenFOAM ready && tail -f /dev/null"]
    # ESI-OpenCFD publishes multi-arch images for 2312; on Apple Silicon we rely
    # on the arm64 manifest. If your host is an older ARM Mac without arm64
    # support, uncomment the next line to force amd64 (runs under Rosetta/QEMU).
    # platform: linux/amd64
    working_dir: /cases
    volumes:
      - ./openfoam_cases:/cases
      - ./services/simulation/openfoam_templates:/templates:ro
    # Healthcheck: source the bashrc and confirm blockMesh is on PATH.
    # (foamVersion binary isn't shipped in opencfd/openfoam-default:2312.)
    healthcheck:
      test: ["CMD-SHELL", "source /usr/lib/openfoam/openfoam2312/etc/bashrc && command -v blockMesh > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # interFoam is CPU-hungry. Omitting cpus/cpuset lets the container use all
    # host cores. Cap memory so a runaway solve doesn't thrash the host.
    mem_limit: "8g"

volumes:
  postgres_data:
  minio_data:
